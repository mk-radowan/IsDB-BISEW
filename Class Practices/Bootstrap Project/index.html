<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .top-nav-gray {
            background-color: #e9ecef; /* Light gray background */
            font-size: 14px;
            padding: 8px 20px;
        }
        /* Custom toggle styling */
        .lang-switch .form-check-input {
            width: 40px;
            height: 20px;
            cursor: pointer;
            background-color: #000;
            border-color: #000;
        }
        .lang-switch .form-check-input:checked {
            background-color: #000;
            border-color: #000;
        }
        .nav-link-custom {
            text-decoration: none;
            color: #333;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

<div class="top-nav-gray d-flex justify-content-end align-items-center">
    <div class="d-flex align-items-center me-4">
        <span class="me-2 fw-bold">En</span>
        <div class="form-check form-switch lang-switch mb-0">
            <input class="form-check-input" type="checkbox" role="switch" id="langToggle">
        </div>
        <span class="ms-2 fw-bold">বাংলা</span>
    </div>

    <a href="#" class="nav-link-custom me-4">
        <i class="bi bi-house-door"></i>
        <span>Offline Store</span>
    </a>

    <a href="#" class="nav-link-custom">
        <i class="bi bi-bell"></i>
    </a>
</div>

</body>
</html>
