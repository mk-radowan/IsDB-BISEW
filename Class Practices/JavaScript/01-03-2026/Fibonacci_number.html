<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        const num = Number(prompt("Input the number of term: "));
        let first = 0;
        let second = 1;
        let next;

        for (let i = 0; i < num; i++) {

            document.write(first + " ");
            next = first + second;
            first = second;
            second = next;
        }
    </script>
</body>

</html>
