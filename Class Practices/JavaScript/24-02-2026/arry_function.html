<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    
    <script>
        let add = (a, b) => a + b;
        console.log(add(12, 20));

         let sub = (a, b) => a - b;
        console.log(sub(120, 20));

         let div = (a, b) => a / b;
        console.log(div(120, 20));

        let mul = (a, b) => a * b;
        console.log(mul(120, 20));

        //Multiple line of Arry function

        const biggest = (a, b) => {
            if (a > b)
               return "a is biggest"

            else 
                return "b is biggest"   
        }
        console.log(biggest(0, 1));

    </script>
</body>
