<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p {
            display: block;
            height: auto;
            width: 30%;
            padding: 5px 0px 5px 0px;
            border: black 1px solid;
            text-align: center;
            justify-content: center;
            color: rgb(118, 165, 42);
            font-size: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <p id="code"></p>
    <script>
        let num1 = Number(prompt("Input 1st number: "));
        let num2 = Number(prompt("Input 2nd number: "));
        let num3 = Number(prompt("Input 3rd number: "));
        let temp;

        if (num1 > num2) {
            temp = num1;
            num1 = num2;
            num2 = temp;
        }

        if (num1 > num3) {
            temp = num1;
            num1 = num3;
            num3 = temp;
        }

        if (num2 > num3) {
            temp = num2;
            num2 = num3;
            num3 = temp;
        }

        document.getElementById("code").innerHTML = `Assending order: ${num1}, ${num2}, ${num3}`;
        // document.write("Assending order: " + num1 + " , " + num2 + " , " + num3);

    </script>
</body>

</html>
