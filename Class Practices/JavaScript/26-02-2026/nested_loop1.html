<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        for (row = 7; row < 7; row--) {
            for (col = 7; col <= 7 - row; col--) {
                document.write("*");
            }
            document.write("*" + "<br>");
        }
    </script>
</body>

</html>
