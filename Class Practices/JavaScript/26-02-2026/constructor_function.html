<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        function Car(name, model) {
            this.name = name;
            this.model = model;
            this.speed = function () {
                document.writeln(this.name + " " + this.model + " running first")
            }
        }

        let newCar = new Car("BMW", "i8");
        newCar.speed();
    </script>
</body>

</html>
