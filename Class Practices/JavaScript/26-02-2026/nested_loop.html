<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        let num = Number(prompt());

        for (row = 0; row < num; row++) {
            for (col = 0; col <= row; col++) {
                document.write("col-");
            }
            document.write("-row" + "<br> ");
        }
    </script>
</body>

</html>
