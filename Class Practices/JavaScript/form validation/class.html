<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form name="f" onsubmit="return dtaValidation()">
        <label for="">Name:</label> <br>
        <input type="text" name="name"> <br> <br>

        <label for="">Email:</label> <br>
        <input type="text" name="email"> <br> <br>

        <label for="">Password:</label> <br>
        <input type="text" name="password"> <br> <br>

        <input type="submit" value="submit">
    </form>
    <script>
        function dtaValidation() {
            var textName = document.f.name.value;
            var textEmail = document.f.email.value;
            var textPass = document.f.password.value;

            if (textName == "") {
                alert("Name fill is emty");
                return false;
            }

            if (textEmail == "") {
                alert("Email is emty");
                return false;
            }

            if (textEmail.indexOf("@") == -1 || textEmail.indexOf(".")) {
                alert("Invaild Email");
                return false;
            }
        }

        if (textPass.length < 4 || textPass.length < 8) {
            alert("Passwor btween 4 to 8 charceter");
            return false;
        }

        var newWindow = window.open("", "", "width=400,height=300");

        newWindow.document.write("<h2>Form Submitted Successfully!</h2>");
        newWindow.document.write("Name: " + textName + "<br>");
        newWindow.document.write("Pass: " + textEmail + "<br>");
        newWindow.document.write("Email: " + textPass);

        return false; // Prevent actual form submission
    </script>
</body>

</html>
