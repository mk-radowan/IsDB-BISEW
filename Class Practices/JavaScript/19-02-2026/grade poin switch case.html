<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        var mark = Number(prompt("Input any mark: "));
        var reslt;
        switch (true){
            case (mark >= 80 && mark <= 100 ) : 
                        reslt = "A+"
                        break;
             case (mark >= 70 && mark <= 79 ) : 
                        reslt = "A"
                        break;
                        
             case (mark >= 60 && mark <= 69 ) : 
                        reslt = "A-"
                        break;
                        
              case (mark >= 50 && mark <= 59 ) : 
                        reslt = "B+"
                        break;
               case (mark >= 40 && mark <= 49 ) : 
                        reslt = "B"
                        break;
                case (mark >= 33 && mark <= 39 ) : 
                        reslt = "C"
                        break; 
                 case (mark >= 0 && mark <= 32 ) : 
                        reslt = "F"
                        break;  
                default :
                    reslt = "Invaild Mark"                                           
        }

        document.writeln("Result: " + reslt);

    </script>
</body>
</html>
