<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        var num1, num2, num3,max;
        num1 = Number(prompt("Input the 1st number: "));
        num2 = Number(prompt("Input the 1st number: "));
        num3 = Number(prompt("Input the 1st number: "));

        switch (true){
            case (num1 > num2 && num1 > num3) : 
            max = num1;
            break;
            case (num2 > num3 && num2 > num1) : 
            max = num2;
            break;

            default :
                    max = num3;
        }

        document.writeln(max + " is biggest number");
    </script>
</body>
</html>
