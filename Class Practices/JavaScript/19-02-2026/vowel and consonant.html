<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        var letter = prompt("Input any Latter").toLowerCase();

        switch (letter){
            case "A" :
            case "E" :
            case "I" :
            case "O" :
            case "U" :
                document.writeln(letter + "is a vowel");
                break;
                
            default :
                    document.writeln(letter + " is a consonant");    

        }
    </script>
</body>
</html>
