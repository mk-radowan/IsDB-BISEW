<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var num = Number(prompt("Input any number: "));
        var count = 0;

        if (num <= 1) {
            document.writeln(num + " : Invalid range");
        }

        else {
            for (i = 2; i < num; i++) {
                if (num % i == 0) {
                    count++;
                    break;
                }
            }

            if (count == 0) {
                document.writeln(num + " is prime");
            }

            else {
                document.writeln(num + " is not prime");
            }
        }
    </script>
</body>

</html>
