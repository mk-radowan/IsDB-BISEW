<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
</head>

<body>
    <script>
        let mark = Number(prompt("Input any mark: "));
        let result;

        switch (true) {
            case mark >= 80 && mark <= 100:
                result = "A+"
                break;

            case mark >= 70 && mark < 80:
                result = "A"
                break;

            case mark >= 60 && mark < 70:
                result = "B"
                break;

            case mark >= 0 && mark < 60:
                result = "F"
                break;

            default:
                result = " is Invaild mark"
        }

        document.write(mark + ", GPA: " + result);

    </script>
</body>

</html>
