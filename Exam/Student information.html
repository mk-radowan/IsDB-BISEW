<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student information form</title>
</head>

<body>
    <form name="f" onsubmit="return dtaValidation()">
        <label for="">Name:</label> <br>
        <input type="text" name="name"> <br> <br>

        <label for="">Email:</label> <br>
        <input type="text" name="email"> <br> <br>

        <!-- Course -->
        <label for="">Course: </label>
        <input type="checkbox" name="textCourse" value="HTML">
        <label for="">HTML</label>

        <input type="checkbox" name="textCourse" value="JavaScript">
        <label for="">JavaScript</label>

        <input type="checkbox" name="textCourse" value="PHP">
        <label for="">PHP</label> <br> <br>

        <!-- Gender -->
        <label for="">Gender: </label>
        <input type="radio" name="genRadio" value="Male">
        <label for="">Male</label>
        <input type="radio" name="genRadio" value="Femel">
        <label for="">Female</label>
        <input type="radio" name="genRadio" value="Other's">
        <label for="">Other's</label> <br> <br>


        <!-- department -->
        <label for="">Department: </label>
        <select value="" name="sub">
            <option value="CSE">CSE</option>
            <option value="EEE">EEE</option>
            <option value="BBA">BBA</option>
        </select> <br> <br>

        <label for="">Password:</label> <br>
        <input type="text" name="password"> <br> <br>

        <input type="submit" value="submit">
    </form>
    <script>
        function dtaValidation() {
            var textName = document.f.name.value;
            var textEmail = document.f.email.value;
            var textPass = document.f.password.value;
            var course = document.f.textCourse;
            var stuCourse = "";
            var gender = document.f.genRadio;
            var dep = document.f.sub.value;


            for (let i = 0; i < course.length; i++) {
                if (course[i].checked) {
                    stuCourse += course[i].value + " ";
                }
            }


            for (let i = 0; i < gender.length; i++) {
                if (gender[i].checked) {
                    gender = gender[i].value + " ";
                }
            }




            var newWindow = window.open("", "", "width=600,height=500");

            newWindow.document.write("<h2>Form Submitted Successfully!</h2>");
            newWindow.document.write("Name: " + textName + "<br>");

            newWindow.document.write("Email: " + textEmail + "<br>");
            newWindow.document.write("Course: " + stuCourse + "<br>");
            newWindow.document.write("Gender: " + gender + "<br>");
            newWindow.document.write("Department: " + dep + "<br>");
            newWindow.document.write("Pass: " + textPass + "<br>");
            newWindow.document.write("<input type='button' value='Close me' onclick='self.close()'>" + "   ");
            newWindow.document.write("   " + "<input type='button' value='Print' onclick='self.print()'>");

            return false; // Prevent actual form submission
        }


    </script>
</body>

</html>
